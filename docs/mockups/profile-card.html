<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로필 카드 — 최종</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#fff;color:#1a1a1a;line-height:1.7;padding:40px 20px}
.container{max-width:600px;margin:0 auto}
h2{font-size:16px;margin:30px 0 12px;color:#555}
.mockup-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;margin:20px 0;padding:24px 32px}
.profile-card{border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:24px 0}
.pc-top{display:flex;align-items:center;gap:16px}
.pc-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0}
.pc-name{font-weight:800;font-size:16px;color:#1a1a1a}
.pc-role{font-weight:600;font-size:13px;color:#F75D5D}
.pc-desc{margin:4px 0 0;font-size:13px;color:#64748b;line-height:160%}
.pc-badge-row{margin-top:16px;padding-top:16px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:12px}
.pc-badge-row img.inline-logo{height:36px}
</style>
</head>
<body>
<div class="container">
<h1 style="font-size:20px;margin-bottom:4px">프로필 카드 최종</h1>
<p style="color:#888;font-size:13px;margin-bottom:20px">B안 수정 — 로고 키움 + 문구 변경</p>

<div class="mockup-wrap">
  <div class="profile-card">
    <div class="pc-top">
      <img class="pc-photo" src="images/profile-smith.png" alt="스미스">
      <div>
        <div class="pc-name">스미스 <span class="pc-role">자사몰사관학교 코치</span></div>
        <div class="pc-desc">Meta가 인증한 비즈니스 파트너<br>수강생 자사몰매출 450억+</div>
      </div>
    </div>
    <div class="pc-badge-row">
      <img class="inline-logo" src="images/inline-positive.png" alt="Meta Business Partners">
    </div>
  </div>
</div>

</div>
</body>
</html>
