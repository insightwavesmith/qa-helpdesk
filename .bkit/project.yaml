id: bscamp
name: "자사몰사관학교"
description: "메타 광고 전문 자사몰 교육 플랫폼"

infrastructure:
  db:
    type: sqlite
    orm: drizzle-orm
    driver: better-sqlite3
    path: .data/bkit.db
    constraints:
      - "UUID 컬럼은 TEXT 타입 + 앱에서 uuid() 생성"
      - "JSON 컬럼은 TEXT 타입 + JSON.parse() 사용"
      - "타임스탬프는 TEXT + datetime('now')"
      - "RLS 미지원 — Express 미들웨어에서 권한 검증"

  services:
    - name: dashboard
      port: 3200
      language: typescript
      framework: express
      description: "CRUD gateway + 프론트엔드 API"

    - name: engine
      port: 3202
      language: python
      framework: fastapi
      description: "브릭 실행 엔진 (상태 전이, Gate, Adapter)"

  runtime: cloud-run
  cloud:
    provider: gcp
    project_id: "modified-shape-477110-h8"
    services:
      - bscamp
      - bscamp-web
      - bscamp-cron
      - collect-daily

  languages:
    - typescript
    - python
