  - "배포는 Cloud Run. Vercel 아님"
  - "포트 3200=Express, 3202=Python 엔진"
  - "Primary 색상: #F75D5D, hover: #E54949"
  - "한국어 UI 전용. 영어 라벨 금지"
  - "라이트 모드만. 다크 모드 토글 없음"

agents:
  cto: cto-lead
  pm: pm-lead
  qa: qa-monitor
