$schema: brick/preset-v2
name: "T-PDCA L0 응급"
description: "프로덕션 장애 — Do + QA only"
level: 0

blocks:
  - id: do
    type: Do
    what: "긴급 수정"
    done:
      artifacts: []
      metrics: {tsc_errors: 0, build_pass: true}
  - id: qa
    type: Check
    what: "빌드 확인"
    done:
      metrics: {build_pass: true}
    gate:
      handlers:
        - type: metric
          metric: build_pass
          threshold: 1
      on_fail: retry
      max_retries: 1

links:
  - {from: do, to: qa, type: sequential}

teams:
  do: {adapter: claude_agent_teams, config: {session: sdk-cto, role: CTO_LEADER}}
  qa: {adapter: claude_agent_teams, config: {session: sdk-cto, role: CTO_LEADER}}
